<!DOCTYPE html>
<html>
<head>
    <title>calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <input id="pantalla"type="text">

            <button id="boton-siete">7</button>
            <button id="boton-ocho">8</button>
            <button id="boton-nueve">9</button>
            <button id="boton-diagonal">/</button>

            <button id="boton-borrar-todo" class="boton-grande">cd</button>

            <button id="boton-cuatro">4</button>
            <button id="boton-cinco">5</button>
            <button id="boton-seis">6</button>
            <button id="boton-asterisco">*</button>

            <button id="boton-uno">1</button>
            <button id="boton-dos">2</button>
            <button id="boton-tres">3</button>
            <button id="boton-menos">-</button>

            <button id="boton-igual" class="boton-grande">=</button>

            <button id="boton-punto">.</button>
            <button id="boton-cero">0</button>
            <button id="boton-borrar">c</button>
            <button id="boton-mas">+</button>
            
    </div>
    <script src="script.js"></script>
</body>
</html>
